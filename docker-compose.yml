version: '3.8'

services:
  koval-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: koval-production-server
    ports:
      - "8731:8731"
    volumes:
      - koval-db:/koval/db
      - koval-artifacts:/koval/artifacts
      - koval-repos:/koval/repos
    restart: unless-stopped
    environment:
      - RUST_LOG=info

volumes:
  koval-db:
    driver: local
  koval-artifacts:
    driver: local
  koval-repos:
    driver: local
